<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Grand Paris Express Line 15 precedent schematic</title>
  <desc id="desc">A simplified schematic inspired by the official Paris Metro Line 15 diagram, showing a burgundy orbital route, station nodes and interchange markers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#f6f7f9"/>
      <stop offset="1" stop-color="#fff3ea"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10233f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="620" rx="28" fill="url(#bg)"/>

  <g class="line-15-brand" transform="translate(48 42)">
    <circle cx="38" cy="38" r="32" fill="#ffffff" stroke="#0b2f9f" stroke-width="6"/>
    <text x="38" y="50" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="760" fill="#0b2f9f">M</text>
    <circle cx="112" cy="38" r="32" fill="#b40f3a"/>
    <text x="112" y="52" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="820" fill="#ffffff">15</text>
  </g>

  <g class="line-15-context" opacity="0.32" stroke="#cad2dc" stroke-width="2" fill="none">
    <path d="M115 178 C245 110 380 118 485 178 S700 234 842 158"/>
    <path d="M118 472 C248 394 382 420 486 463 S704 526 846 450"/>
    <path d="M235 108 C310 222 330 352 262 528"/>
    <path d="M722 98 C650 230 656 365 736 530"/>
    <path d="M104 315 H856"/>
  </g>

  <g filter="url(#softShadow)">
    <path
      class="line-15-route-halo"
      d="M94 252 H834 Q898 252 898 316 V404 Q898 470 832 470 H126 Q62 470 62 404 V316 Q62 252 94 252 Z"
      fill="none"
      stroke="#ffffff"
      stroke-width="42"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      class="line-15-route-track"
      d="M94 252 H834 Q898 252 898 316 V404 Q898 470 832 470 H126 Q62 470 62 404 V316 Q62 252 94 252 Z"
      fill="none"
      stroke="#b40f3a"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <g fill="#ffffff" stroke="#111827" stroke-width="6">
    <circle class="line-15-station-node" style="--node-index: 0" cx="112" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 1" cx="214" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 2" cx="316" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 3" cx="424" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 4" cx="538" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 5" cx="650" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 6" cx="760" cy="252" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 7" cx="850" cy="268" r="17"/>

    <circle class="line-15-station-node" style="--node-index: 14" cx="118" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 13" cx="238" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 12" cx="362" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 11" cx="486" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 10" cx="610" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 9" cx="734" cy="470" r="17"/>
    <circle class="line-15-station-node" style="--node-index: 8" cx="850" cy="452" r="17"/>
  </g>

  <g class="line-15-labels" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="760" fill="#101828">
    <text transform="translate(105 214) rotate(-57)" font-size="20">Nanterre</text>
    <text transform="translate(207 214) rotate(-57)" font-size="20">La Défense</text>
    <text transform="translate(309 214) rotate(-57)" font-size="20">Bécon</text>
    <text transform="translate(416 214) rotate(-57)" font-size="20">Saint-Denis</text>
    <text transform="translate(530 214) rotate(-57)" font-size="20">Bobigny</text>
    <text transform="translate(642 214) rotate(-57)" font-size="20">Rosny</text>
    <text transform="translate(752 214) rotate(-57)" font-size="20">Val de Fontenay</text>

    <text transform="translate(118 510) rotate(-57)" font-size="20">Pont de Sèvres</text>
    <text transform="translate(238 510) rotate(-57)" font-size="20">Issy RER</text>
    <text transform="translate(362 510) rotate(-57)" font-size="20">Châtillon</text>
    <text transform="translate(486 510) rotate(-57)" font-size="20">Bagneux</text>
    <text transform="translate(610 510) rotate(-57)" font-size="20">Villejuif</text>
    <text transform="translate(734 510) rotate(-57)" font-size="20">Créteil</text>
    <text transform="translate(850 512) rotate(-57)" font-size="20">Champigny</text>
  </g>

  <g class="line-15-transfers" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="760" text-anchor="middle">
    <g transform="translate(214 297)">
      <circle r="13" fill="#ffffff" stroke="#0b2f9f" stroke-width="3"/>
      <text y="6" font-size="16" fill="#0b2f9f">M</text>
      <circle cx="30" r="13" fill="#ffc400"/>
      <text x="30" y="6" font-size="16" fill="#111827">1</text>
      <circle cx="60" r="13" fill="#ef4bb8"/>
      <text x="60" y="6" font-size="15" fill="#ffffff">RER</text>
    </g>
    <g transform="translate(424 297)">
      <circle r="13" fill="#ffffff" stroke="#0b2f9f" stroke-width="3"/>
      <text y="6" font-size="16" fill="#0b2f9f">M</text>
      <circle cx="30" r="13" fill="#80c8d8"/>
      <text x="30" y="6" font-size="16" fill="#111827">13</text>
      <circle cx="64" r="13" fill="#7251b5"/>
      <text x="64" y="6" font-size="16" fill="#ffffff">14</text>
    </g>
    <g transform="translate(650 297)">
      <circle r="13" fill="#ffffff" stroke="#0b2f9f" stroke-width="3"/>
      <text y="6" font-size="16" fill="#0b2f9f">M</text>
      <circle cx="30" r="13" fill="#9bd35d"/>
      <text x="30" y="6" font-size="16" fill="#111827">11</text>
      <circle cx="64" r="13" fill="#f3a23a"/>
      <text x="64" y="6" font-size="16" fill="#111827">5</text>
    </g>
    <g transform="translate(486 425)">
      <circle r="13" fill="#ffffff" stroke="#0b2f9f" stroke-width="3"/>
      <text y="6" font-size="16" fill="#0b2f9f">M</text>
      <circle cx="30" r="13" fill="#b05cc8"/>
      <text x="30" y="6" font-size="16" fill="#ffffff">4</text>
      <circle cx="64" r="13" fill="#ffffff" stroke="#d5a324" stroke-width="3"/>
      <text x="64" y="6" font-size="15" fill="#d5a324">RER</text>
    </g>
  </g>

  <g class="line-15-note" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#10233f">
    <text x="54" y="584" font-size="18" font-weight="760" opacity="0.78">
      Simplified from the official Line 15 diagram language: orbital route, interchange nodes, suburb-to-suburb connectivity.
    </text>
  </g>
</svg>
